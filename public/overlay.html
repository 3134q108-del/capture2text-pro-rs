<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      #frame {
        position: absolute;
        inset: 0;
        box-sizing: border-box;
        border: 1px solid rgba(0, 128, 255, 1);
      }
    </style>
  </head>
  <body>
    <div id="frame"></div>
  </body>
</html>
